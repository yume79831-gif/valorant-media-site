<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Haven C retake tactical screenshot placeholder</title>
  <desc id="desc">A stylized tactical board showing two routes into Haven C site.</desc>
  <defs>
